name: Update Checker

env:
  REPO_URL: https://github.com/graysky2/openwrt
  REPO_BRANCH: x86-6.18v2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: 30 18 * * *

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Get Commit Hash
        id: getHash
        run: |
          git clone --depth 1 "$REPO_URL" -b "$REPO_BRANCH" .
          echo "commitHash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compare Commit Hash
        id: cacheHash
        uses: actions/cache@v5
        with:
          path: .commitHash
          key: commitHash_${{ steps.getHash.outputs.commitHash }}
          restore-keys: |
            commitHash_

      - name: Save New Commit Hash
        if: steps.cacheHash.outputs.cache-hit != 'true'
        run: |
          echo "${{ steps.getHash.outputs.commitHash }}" | tee .commitHash

      - name: Trigger build
        if: steps.cacheHash.outputs.cache-hit != 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ github.token }}
          event-type: Source Code Update

      - name: Delete old workflow runs
        if: (!cancelled())
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="${{ github.repository }}"
          keep=2

          mapfile -t run_ids < <(
            gh api "repos/$repo/actions/runs?per_page=100" \
              --jq '.workflow_runs
              | map(select(.status=="completed"))
              | sort_by(.created_at)
              | reverse
              | .['"$keep"':]
              | .[].id'
          )

          if [ "${#run_ids[@]}" -gt 0 ]; then
            for id in "${run_ids[@]}"; do
              echo "Deleting workflow run $id"
              gh api -X DELETE "repos/$repo/actions/runs/$id" || true
            done
          else
            echo "No old workflow runs to delete."
          fi
